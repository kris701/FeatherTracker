name: Build and Create Release

on:
  push:
    branches: [ "main" ]

jobs:
  check-tag:
    name: Check build tag
    runs-on: ubuntu-latest
    outputs: 
        releaseExists: ${{ steps.check-tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Client Project version
        id: get-version
        uses: kzrnm/get-net-sdk-project-versions-action@v1
        with:
          proj-path: API/FeatherTracker.API/FeatherTracker.API.csproj

      - uses: mukunku/tag-exists-action@v1.6.0
        id: check-tag
        with: 
          tag: 'v${{ steps.get-version.outputs.package-version }}'

  createRelease:
    name: Build and Create Release
    needs: check-tag
    if: needs.check-tag.outputs.releaseExists == 'false' && 'false' == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v1
        with:
          node-version: 23.6.0

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Compile Client project as publish files
        run: |
            cd Frontend
            npm i
            npm run deploy feathertracker
            cd ..

      - name: Compile API project as publish files
        run: dotnet publish .\API\FeatherTracker.API\FeatherTracker.API.csproj /p:RuntimeIdentifier=linux-x64 /p:PublishProvider=FileSystem

      - name: Compile Database project as publish files
        run: msbuild .\Database\FeatherTracker.Database\ /p:OutputPath=../../Output/Database /P:Configuration=Release

      - name: Compress Client build files
        uses: vimtor/action-zip@v1.2
        with:
          files: Output/Frontend/browser/
          dest: Output/client.zip

      - name: Compress API build files
        uses: vimtor/action-zip@v1.2
        with:
          files: Output/API/net10.0/linux-x64/publish/
          dest: Output/api.zip

      - name: Compress Database build files
        uses: vimtor/action-zip@v1.2
        with:
          files: Output/Database/
          dest: Output/database.zip

      - name: Get API Project version
        id: get-version
        uses: kzrnm/get-net-sdk-project-versions-action@v1
        with:
          proj-path: .\API\FeatherTracker.API\FeatherTracker.API.csproj
          
      - name: Create Tag
        uses: jaywcjlove/create-tag-action@main
        with:
          version: "v${{ steps.get-version.outputs.package-version }}"
      
      - name: Generate Release
        uses: ncipollo/release-action@v1
        with:
          skipIfReleaseExists: true
          artifacts: "Output/*.zip"
          tag: "v${{ steps.get-version.outputs.package-version }}"
          generateReleaseNotes: true

  createReleaseDocker:
    name: Build and Create Release (Docker)
    needs: check-tag
    if: needs.check-tag.outputs.releaseExists == 'false'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get API Project version
        id: get-version
        uses: kzrnm/get-net-sdk-project-versions-action@v1
        with:
          proj-path: .\API\FeatherTracker.API\FeatherTracker.API.csproj

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Compile Database project as publish files
        run: msbuild /t:Build .\Database\FeatherTracker.Database /p:Configuration=Release /p:OutputPath=./../../Docker/Database

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push (Database)
        uses: docker/build-push-action@v7
        with:
          file: .\Docker\database.Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/feathertracker-database:${{ steps.get-version.outputs.package-version }}

      - name: Build and push (API)
        uses: docker/build-push-action@v7
        with:
          file: .\Docker\api.Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/feathertracker-api:${{ steps.get-version.outputs.package-version }}

      - name: Build and push (Frontend)
        uses: docker/build-push-action@v7
        with:
          file: .\Docker\frontend.Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/feathertracker-frontend:${{ steps.get-version.outputs.package-version }}

  testBuild:
    name: Build and Test
    needs: check-tag
    if: needs.check-tag.outputs.releaseExists == 'true'
    runs-on: windows-latest
    steps:
      - name: Install Node
        uses: actions/setup-node@v1
        with:
          node-version: 23.6.0

      - uses: actions/checkout@v4

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build API
        run: dotnet build .\API\FeatherTracker.API\FeatherTracker.API.csproj
        
      - name: Build Database
        run: msbuild .\Database\FeatherTracker.Database\

      - name: Build Frontend
        run: |
            cd Frontend
            npm i
            npm run build